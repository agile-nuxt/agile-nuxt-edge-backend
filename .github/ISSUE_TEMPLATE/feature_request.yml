name: Feature request
description: Propose a focused addition or improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - edge-db storage or queries
        - Nuxt/Nitro backend
        - Authentication or permissions
        - CLI and diagnostics
        - Quickstart template
        - Documentation and release tooling
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: Explain the concrete workflow this should enable.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Include API examples and safety implications when relevant.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
