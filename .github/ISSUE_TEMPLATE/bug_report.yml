name: Bug report
description: Report a reproducible problem in edge-db or backend.
title: "[Bug]: "
labels:
  - bug
body:
  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - "@agile-nuxt/edge-db"
        - "@agile-nuxt/backend"
        - "agile-nuxt-fullstack template"
        - "Documentation or tooling"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: 0.1.0
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Runtime
      placeholder: Node 22, Nuxt 4, Linux
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Problem
      description: Describe the observed and expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Provide code or a repository without secrets or private data.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I removed credentials, tokens, storage data, and personal information.
          required: true
